name: Telegram Diagnose

# Manual-only: sends a marked test message to both configured chats and
# prints Telegram's delivery confirmation (no chat names/ids in the log).
on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID_REPORT: ${{ secrets.CHAT_ID_REPORT }}
      CHAT_ID_ALERTS: ${{ secrets.CHAT_ID_ALERTS }}
    steps:
      - name: Send test messages
        run: |
          python - <<'EOF'
          import os, json, urllib.request, datetime

          token = os.environ["BOT_TOKEN"]
          stamp = datetime.datetime.utcnow().strftime("%H:%M UTC")

          def call(method, payload):
              req = urllib.request.Request(
                  f"https://api.telegram.org/bot{token}/{method}",
                  data=json.dumps(payload).encode(),
                  headers={"Content-Type": "application/json"})
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.load(r)
              except urllib.error.HTTPError as e:
                  return json.load(e)

          for name in ("CHAT_ID_REPORT", "CHAT_ID_ALERTS"):
              chat_id = os.environ.get(name, "")
              if not chat_id:
                  print(f"{name}: NOT SET")
                  continue
              info = call("getChat", {"chat_id": chat_id})
              chat_type = info.get("result", {}).get("type") if info.get("ok") else f"error: {info.get('description')}"
              resp = call("sendMessage", {
                  "chat_id": chat_id,
                  "text": f"🔧 Telegram diagnostic test ({name}, {stamp}) — if you can read this, this chat works."})
              ok = resp.get("ok")
              msg_id = resp.get("result", {}).get("message_id")
              err = resp.get("description")
              print(f"{name}: chat_type={chat_type} send_ok={ok} message_id={msg_id} error={err}")
          EOF
