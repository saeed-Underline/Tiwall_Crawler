name: Gemini Diagnose

# Manual-only: probes which Gemini model / grounding combinations the
# repo's API key can actually use. Prints a result matrix to the log.
on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install google-genai
        run: pip install google-genai

      - name: Probe models
        run: |
          python - <<'EOF'
          import os
          from google import genai
          from google.genai import types

          client = genai.Client(api_key=os.environ["GEMINI_API_KEY"],
                                http_options=types.HttpOptions(timeout=60_000))

          models = ["gemini-3.1-flash-lite", "gemini-3.5-flash", "gemini-2.5-flash",
                    "gemini-2.5-flash-lite", "gemini-flash-lite-latest"]
          for model in models:
              for grounded in (False, True):
                  label = f"{model} {'WITH' if grounded else 'without'} grounding"
                  cfg = None
                  if grounded:
                      cfg = types.GenerateContentConfig(
                          tools=[types.Tool(google_search=types.GoogleSearch())])
                  try:
                      r = client.models.generate_content(
                          model=model, contents="Reply with the single word: ok",
                          config=cfg)
                      print(f"PASS  {label}: {(r.text or '').strip()[:40]!r}")
                  except Exception as e:
                      msg = str(e).replace("\n", " ")[:180]
                      print(f"FAIL  {label}: {msg}")
          EOF
