name: Tiwall Watcher

on:
  schedule:
    # runs at minute 9 of every hour, UTC
    - cron: "9 * * * *"
  # optional: allow manual run from GitHub UI
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    # Needed to commit information.txt (show feedback bank) back to the repo
    permissions:
      contents: write

    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID_REPORT: ${{ secrets.CHAT_ID_REPORT }}
      CHAT_ID_ALERTS: ${{ secrets.CHAT_ID_ALERTS }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ticket watcher
        run: |
          python app.py

      - name: Commit updated show information bank
        run: |
          git add information.txt
          if git diff --cached --quiet; then
            echo "No new show information."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Update information.txt (show feedback bank)"
            # autostash: the run leaves generated files (e.g. the PDF) in the tree
            git pull --rebase --autostash origin main
            git push
          fi
