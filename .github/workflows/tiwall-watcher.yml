name: Tiwall Watcher

on:
  schedule:
    # runs at minute 9 of every hour, UTC
    - cron: "9 * * * *"
  # optional: allow manual run from GitHub UI
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID_REPORT: ${{ secrets.CHAT_ID_REPORT }}
      CHAT_ID_ALERTS: ${{ secrets.CHAT_ID_ALERTS }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ticket watcher
        run: |
          python app.py
